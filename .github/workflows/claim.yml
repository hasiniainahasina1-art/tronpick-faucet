name: Claim Tronpick Faucet

on:
  schedule:
    - cron: '0 * * * *'   # toutes les heures
  workflow_dispatch:

jobs:
  claim:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: 🟢 Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Installer dépendances système (xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: 📦 Installer dépendances Node.js
        run: npm install

      - name: 🤖 Exécuter le script
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_REPO: ${{ secrets.GH_REPO }}
          GH_BRANCH: ${{ secrets.GH_BRANCH }}
          GH_FILE_PATH: ${{ secrets.GH_FILE_PATH }}
          PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
          PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node script.js
