name: Claim Tronpick Faucet

on:
  workflow_dispatch:
    inputs:
      email:
        required: true
        type: string
      platform:
        required: true
        type: string
      userId:
        required: true
        type: string

jobs:
  claim:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Récupérer le code source
        uses: actions/checkout@v4

      - name: 🟢 Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Installer les dépendances système (xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: 📦 Installer les dépendances Node.js
        run: npm install

      - name: 🤖 Exécuter le claim pour ${{ github.event.inputs.email }} sur ${{ github.event.inputs.platform }}
        env:
          CLAIM_EMAIL: ${{ github.event.inputs.email }}
          CLAIM_PLATFORM: ${{ github.event.inputs.platform }}
          USER_ID: ${{ github.event.inputs.userId }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_REPO: ${{ secrets.GH_REPO }}
          GH_BRANCH: ${{ secrets.GH_BRANCH }}
          GH_FILE_PATH: ${{ secrets.GH_FILE_PATH }}
          JP_PROXY_LIST: ${{ secrets.JP_PROXY_LIST }}
          CRYPTO_SECRET: ${{ secrets.CRYPTO_SECRET }}
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node script.js

      - name: 📤 Upload des captures d'écran
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ github.event.inputs.email }}-${{ github.event.inputs.platform }}
          path: screenshots/
