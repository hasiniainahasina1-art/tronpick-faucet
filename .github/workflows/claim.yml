name: Claim Tronpick Faucet

on:
  schedule:
    # Exécution toutes les 6 heures (modifiez selon vos besoins)
    - cron: '0 */6 * * *'
  workflow_dispatch:   # Permet de lancer manuellement depuis l'interface GitHub

jobs:
  claim:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Récupérer le code source
        uses: actions/checkout@v4

      - name: 🟢 Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Installer les dépendances
        run: npm install

      - name: 🤖 Exécuter le script de claim
        env:
          TRONPICK_EMAIL: ${{ secrets.TRONPICK_EMAIL }}
          TRONPICK_PASSWORD: ${{ secrets.TRONPICK_PASSWORD }}
          PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
          PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
          BROWSERLESS_TOKEN: ${{ secrets.BROWSERLESS_TOKEN }}
        run: node script.js

      - name: 📝 Commiter et pousser le nouveau statut
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/status.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Mise à jour du statut faucet [skip ci]" && git push)
