name: Claim Tronpick Faucet

on:
  schedule:
    # Exécution automatique toutes les heures à la minute 0
    - cron: '0 * * * *'
  workflow_dispatch:   # Permet de lancer manuellement depuis l'onglet Actions

jobs:
  claim:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Récupérer le code source
        uses: actions/checkout@v4

      - name: 🟢 Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Installer les dépendances système (xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: 📦 Installer les dépendances Node.js
        run: npm install

      - name: 🤖 Exécuter le script d'automatisation
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
          PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node script.js
