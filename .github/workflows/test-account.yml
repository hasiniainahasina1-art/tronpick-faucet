name: Test Account Login

on:
  workflow_dispatch:
    inputs:
      email:
        required: true
        type: string
      password:
        required: true
        type: string
      platform:
        required: true
        type: string
      proxyIndex:
        required: false
        type: string
      initialTimer:
        required: false
        type: string
        default: "60:00"
      action:
        required: false
        type: string
        default: "login"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: sudo apt-get update && sudo apt-get install -y xvfb
      - run: npm install puppeteer-real-browser @octokit/rest
      - name: Run action
        env:
          TEST_EMAIL: ${{ github.event.inputs.email }}
          TEST_PASSWORD: ${{ github.event.inputs.password }}
          TEST_PLATFORM: ${{ github.event.inputs.platform }}
          TEST_PROXY_INDEX: ${{ github.event.inputs.proxyIndex }}
          TEST_INITIAL_TIMER: ${{ github.event.inputs.initialTimer }}
          TEST_ACTION: ${{ github.event.inputs.action }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_REPO: ${{ secrets.GH_REPO }}
          GH_BRANCH: ${{ secrets.GH_BRANCH || 'main' }}
          GH_FILE_PATH: ${{ secrets.GH_FILE_PATH || 'accounts.json' }}
          JP_PROXY_LIST: ${{ secrets.JP_PROXY_LIST }}
        run: xvfb-run --auto-servernum node test-login-workflow.js
