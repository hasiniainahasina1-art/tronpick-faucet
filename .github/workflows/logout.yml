name: Login

on:
  schedule:
    # Exécution automatique toutes les heures à la minute 0
    - cron: '0 * * * *'
  workflow_dispatch:   # Permet de lancer manuellement

jobs:
  claim:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Récupérer le code source
        uses: actions/checkout@v4

      - name: 🟢 Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Installer les dépendances système (xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: 📦 Installer les dépendances Node.js
        run: npm install

      - name: 🤖 Exécuter le script d'automatisation
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_REPO: ${{ secrets.GH_REPO }}
          GH_BRANCH: ${{ secrets.GH_BRANCH }}
          GH_FILE_PATH: ${{ secrets.GH_FILE_PATH }}
          JP_PROXY_LIST: ${{ secrets.JP_PROXY_LIST }}
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node logout.js

      - name: 📤 Upload des captures d'écran (artefacts)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: faucet-screenshots
          path: screenshots/
