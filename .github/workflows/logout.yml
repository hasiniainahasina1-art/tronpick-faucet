name: Logout Account

on:
  workflow_dispatch:
    inputs:
      email:
        description: 'Email du compte'
        required: true
        type: string
      password:
        description: 'Mot de passe'
        required: true
        type: string
      platform:
        description: 'Plateforme (tronpick, litepick, ...)'
        required: true
        type: string
      proxyIndex:
        description: 'Index du proxy (0,1,2,...)'
        required: false
        type: string

jobs:
  logout:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Récupérer le code source
        uses: actions/checkout@v4
      - name: 🟢 Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 📦 Installer les dépendances système (xvfb)
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: 📦 Installer les dépendances Node.js
        run: npm install puppeteer-real-browser @octokit/rest
      - name: 🤖 Exécuter le script de déconnexion
        env:
          LOGOUT_EMAIL: ${{ github.event.inputs.email }}
          LOGOUT_PASSWORD: ${{ github.event.inputs.password }}
          LOGOUT_PLATFORM: ${{ github.event.inputs.platform }}
          LOGOUT_PROXY_INDEX: ${{ github.event.inputs.proxyIndex }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_REPO: ${{ secrets.GH_REPO }}
          GH_BRANCH: ${{ secrets.GH_BRANCH || 'main' }}
          GH_FILE_PATH: ${{ secrets.GH_FILE_PATH || 'accounts.json' }}
          JP_PROXY_LIST: ${{ secrets.JP_PROXY_LIST }}
        run: xvfb-run --auto-servernum node logout.js
      - name: 📤 Upload des captures d'écran
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logout-screenshots
          path: screenshots/
