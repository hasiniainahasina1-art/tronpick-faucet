name: Logout Account

on:
  workflow_dispatch:
    inputs:
      email:
        description: 'Email du compte'
        required: true
        type: string
      password:
        description: 'Mot de passe'
        required: true
        type: string
      platform:
        description: 'Plateforme (tronpick, litepick, ...)'
        required: true
        type: string
      proxyIndex:
        description: 'Index du proxy (0,1,2,...)'
        required: false
        type: string

jobs:
  logout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: sudo apt-get update && sudo apt-get install -y xvfb
      - run: npm install puppeteer-real-browser @octokit/rest
      - name: Run logout script
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_REPO: ${{ secrets.GH_REPO }}
          JP_PROXY_LIST: ${{ secrets.JP_PROXY_LIST }}
        run: xvfb-run --auto-servernum node logout.js
