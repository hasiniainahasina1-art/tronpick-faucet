<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API sans Supabase</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 5px; }
        .result { background: #f0f0f0; padding: 10px; margin-top: 10px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>Test API (sans authentification)</h1>
    <p>Ce test vérifie uniquement que l'API `/api/data` est accessible.</p>
    <button id="testGetBtn">🔍 GET /api/data (santé)</button>
    <button id="testDispatchBtn">🚀 POST dispatch (test-account)</button>
    <div class="result" id="result">Prêt.</div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const resultDiv = document.getElementById('result');
            const testGetBtn = document.getElementById('testGetBtn');
            const testDispatchBtn = document.getElementById('testDispatchBtn');

            // Test GET simple (vérifie que l'API répond)
            testGetBtn.addEventListener('click', async () => {
                resultDiv.textContent = 'Appel GET en cours...';
                try {
                    const res = await fetch('/api/data?path=/repos/hasiniainahasina1-art/tronpick-faucet/contents/accounts.json&userId=test123');
                    const text = await res.text();
                    resultDiv.textContent = `Statut: ${res.status}\nRéponse: ${text}`;
                } catch (e) {
                    resultDiv.textContent = 'Erreur GET : ' + e.message;
                }
            });

            // Test POST dispatch (sans Supabase, userId bidon)
            testDispatchBtn.addEventListener('click', async () => {
                resultDiv.textContent = 'Appel POST dispatch en cours...';
                try {
                    const url = '/api/data?path=/repos/hasiniainahasina1-art/tronpick-faucet/actions/workflows/test-account.yml/dispatches&userId=test123';
                    const payload = {
                        ref: 'main',
                        inputs: {
                            email: 'test@example.com',
                            password: 'test',
                            platform: 'tronpick',
                            proxyIndex: '0',
                            initialTimer: '60:00',
                            action: 'login',
                            userId: 'test123'
                        }
                    };
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const text = await res.text();
                    resultDiv.textContent = `Statut: ${res.status}\nRéponse: ${text}`;
                } catch (e) {
                    resultDiv.textContent = 'Erreur POST : ' + e.message;
                }
            });
        });
    </script>
</body>
</html>
