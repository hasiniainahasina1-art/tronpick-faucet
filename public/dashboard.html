<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Clic</title>
</head>
<body>
    <h1>Test de clic</h1>
    <button id="testBtn">🚀 Cliquez-moi</button>
    <p id="result"></p>

    <script>
        // Ce script n'utilise aucune bibliothèque externe, juste du JavaScript pur.
        document.addEventListener('DOMContentLoaded', function() {
            const btn = document.getElementById('testBtn');
            const result = document.getElementById('result');
            if (!btn) {
                result.textContent = 'Erreur: bouton introuvable';
                return;
            }
            btn.addEventListener('click', function() {
                result.textContent = 'Le bouton a été cliqué !';
                alert('Clic détecté !');
            });
            result.textContent = 'Script chargé, prêt à cliquer.';
        });
    </script>
</body>
</html>
