<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – Test Dispatch</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        .info { background: #f0f0f0; padding: 10px; margin: 10px 0; }
        .toast { padding: 10px; margin-top: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Dashboard (test dispatch)</h1>
    <div id="status" class="info">Chargement...</div>
    <button id="testDispatchBtn">🚀 Tester le dispatch (test-account.yml)</button>
    <div id="result"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        window.addEventListener('DOMContentLoaded', function() {
            const statusDiv = document.getElementById('status');
            const resultDiv = document.getElementById('result');
            const testBtn = document.getElementById('testDispatchBtn');

            // Vérification du token
            const token = localStorage.getItem('auth_token');
            if (!token) {
                statusDiv.textContent = 'Non connecté. Redirection...';
                window.location.href = '/index.html';
                return;
            }

            // Supabase
            const supabaseUrl = 'https://xwmituhhszailaaxposg.supabase.co';
            const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh3bWl0dWhoc3phaWxhYXhwb3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMjQ4MzQsImV4cCI6MjA5MjgwMDgzNH0.-LWoiKQVvgAhkkG1fF5067V-1ckA2aQ4UaUxfS95ukE';
            const supabase = supabase.createClient(supabaseUrl, supabaseAnonKey);

            async function initAuth() {
                try {
                    const { data: { user }, error } = await supabase.auth.getUser(token);
                    if (error) throw error;
                    if (!user) throw new Error('Utilisateur non trouvé');
                    statusDiv.textContent = '✅ Connecté. UserId : ' + user.id;
                    window.currentUserId = user.id;
                } catch (e) {
                    statusDiv.textContent = '❌ Erreur authentification : ' + e.message + '. Redirection...';
                    localStorage.removeItem('auth_token');
                    setTimeout(() => { window.location.href = '/index.html'; }, 2000);
                }
            }

            // Lancer l'authentification
            initAuth();

            // Test dispatch
            testBtn.addEventListener('click', async () => {
                const uid = window.currentUserId;
                if (!uid) {
                    resultDiv.innerHTML = '<div class="toast error">UserId non chargé.</div>';
                    return;
                }
                resultDiv.innerHTML = '<div class="toast">Envoi en cours...</div>';
                try {
                    const url = `/api/data?path=/repos/hasiniainahasina1-art/tronpick-faucet/actions/workflows/test-account.yml/dispatches&userId=${uid}`;
                    const payload = {
                        ref: 'main',
                        inputs: {
                            email: 'test@test.com',
                            password: 'test',
                            platform: 'tronpick',
                            proxyIndex: '0',
                            initialTimer: '60:00',
                            action: 'login',
                            userId: uid
                        }
                    };
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (res.status === 204) {
                        resultDiv.innerHTML = '<div class="toast success">✅ Succès (204 No Content). Vérifiez l\'onglet Actions.</div>';
                    } else {
                        const text = await res.text();
                        resultDiv.innerHTML = `<div class="toast error">Erreur ${res.status} : ${text}</div>`;
                    }
                } catch (e) {
                    resultDiv.innerHTML = `<div class="toast error">Exception : ${e.message}</div>`;
                }
            });
        });
    </script>
</body>
</html>
