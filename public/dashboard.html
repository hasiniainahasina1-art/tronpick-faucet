<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – Finoana Auto Claim</title>
    <style>
        :root {
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --radius: 8px;
            --shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); font-size: 0.85rem; line-height: 1.4; min-height: 100vh; }
        .header { background: var(--card-bg); padding: 12px 24px; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: space-between; }
        .header h1 { font-size: 1.2rem; }
        .btn { padding: 6px 14px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; font-size: 0.8rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
        .container { max-width: 800px; margin: 20px auto; padding: 0 16px; }
        .card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; margin-bottom: 16px; }
        .accounts-list { display: flex; flex-direction: column; gap: 8px; }
        .account-item { display: flex; justify-content: space-between; padding: 10px; background: #f8fafc; border-radius: 6px; border: 1px solid var(--border); }
        .account-info { display: flex; gap: 15px; flex: 1; align-items: center; }
        .account-email { font-weight: 600; }
        .account-site { background: #e2e8f0; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }
        .account-countdown { font-weight: 700; color: var(--primary); }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--card-bg); border-radius: var(--radius); padding: 20px; width: 90%; max-width: 420px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; }
        .toast { position: fixed; bottom: 24px; right: 24px; background: var(--text); color: white; padding: 10px 20px; border-radius: 6px; z-index: 2000; opacity: 0; }
        .toast.show { opacity: 1; }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
    </style>
</head>
<body>
    <header class="header">
        <h1>⚙️ Finoana Auto Claim</h1>
        <div>
            <button class="btn btn-primary" id="btnAddAccount">➕ Ajouter un compte</button>
            <button class="btn btn-outline" id="logoutBtn" style="margin-left:8px;">🚪 Déconnexion</button>
        </div>
    </header>
    <div class="container">
        <div class="card">
            <h2>📋 Mes comptes</h2>
            <div id="accountsContainer" class="accounts-list"></div>
            <div style="text-align:center; margin-top:10px;">
                <button class="btn btn-outline" id="refreshBtn">🔄 Rafraîchir</button>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3>➕ Nouveau compte</h3>
            <form id="accountForm">
                <input type="hidden" id="editIndex" value="-1">
                <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
                <div class="form-group"><label>Mot de passe</label><input type="password" id="password" required></div>
                <div class="form-group"><label>Plateforme</label><select id="platform">
                    <option value="tronpick">TronPick</option><option value="litepick">LitePick</option><option value="dogepick">DogePick</option><option value="solpick">SolPick</option><option value="binpick">BinPick</option>
                </select></div>
                <div class="form-group"><label>Timer (mm:ss)</label><input type="text" id="initialTimer" value="60:00"></div>
                <button type="submit" class="btn btn-primary" style="margin-top:10px;">💾 Enregistrer</button>
            </form>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Protection renforcée : attendre explicitement que Supabase soit prêt
        function initWhenSupabaseReady() {
            if (typeof window.supabase === 'undefined') {
                alert('Chargement de Supabase...');
                setTimeout(initWhenSupabaseReady, 500);
                return;
            }

            // Éléments DOM
            const btnAdd = document.getElementById('btnAddAccount');
            const logoutBtn = document.getElementById('logoutBtn');
            const refreshBtn = document.getElementById('refreshBtn');
            const modal = document.getElementById('modalOverlay');
            const form = document.getElementById('accountForm');
            const toast = document.getElementById('toast');
            const accountsContainer = document.getElementById('accountsContainer');

            // État
            let currentUserId = null;
            let currentAccounts = [];
            let countdownIntervals = [];

            // Utilitaires
            function showToast(msg, type = '') {
                toast.textContent = msg;
                toast.className = `toast ${type} show`;
                setTimeout(() => { toast.className = 'toast'; }, 5000);
            }

            // Supabase
            const SUPABASE_URL = 'https://xwmituhhszailaaxposg.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh3bWl0dWhoc3phaWxhYXhwb3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMjQ4MzQsImV4cCI6MjA5MjgwMDgzNH0.-LWoiKQVvgAhkkG1fF5067V-1ckA2aQ4UaUxfS95ukE';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            async function getUserId() {
                const token = localStorage.getItem('auth_token');
                if (!token) {
                    window.location.href = '/index.html';
                    return null;
                }
                try {
                    const { data: { user }, error } = await supabase.auth.getUser(token);
                    if (error) throw error;
                    return user.id;
                } catch (e) {
                    showToast('Session invalide', 'error');
                    localStorage.removeItem('auth_token');
                    window.location.href = '/index.html';
                    return null;
                }
            }

            // API GitHub
            const GH_USERNAME = 'hasiniainahasina1-art';
            const GH_REPO = 'tronpick-faucet';
            const BRANCH = 'main';

            async function githubApi(method, path, body = null) {
                const url = `/api/data?path=${encodeURIComponent(path)}&userId=${currentUserId}`;
                const options = { method, headers: { 'Content-Type': 'application/json' } };
                if (body) options.body = JSON.stringify(body);
                const res = await fetch(url, options);
                if (res.status === 204) return {};
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || data.message || `HTTP ${res.status}`);
                return data;
            }

            async function loadAccounts() {
                const apiPath = `/repos/${GH_USERNAME}/${GH_REPO}/contents/accounts.json`;
                try {
                    const data = await githubApi('GET', apiPath);
                    return JSON.parse(atob(data.content));
                } catch (e) {
                    if (e.message.includes('404')) return [];
                    throw e;
                }
            }

            async function triggerWorkflow(workflowId, inputs) {
                const apiPath = `/repos/${GH_USERNAME}/${GH_REPO}/actions/workflows/${workflowId}/dispatches`;
                const payload = { ref: BRANCH, inputs };
                await githubApi('POST', apiPath, payload);
            }

            function renderAccounts() {
                countdownIntervals.forEach(clearInterval);
                countdownIntervals = [];
                accountsContainer.innerHTML = '';
                const visible = currentAccounts.filter(a => a.cookiesStatus !== 'failed');
                if (!visible.length) {
                    accountsContainer.innerHTML = '<p style="text-align:center; padding:20px;">Aucun compte configuré.</p>';
                    return;
                }
                visible.forEach((acc, idx) => {
                    const now = Date.now();
                    const last = acc.lastClaim || 0;
                    const intervalMs = (acc.timer || 60) * 60 * 1000;
                    const nextClaim = last + intervalMs;
                    const remain = Math.max(0, nextClaim - now);
                    const fmt = ms => {
                        const s = Math.floor(ms/1000);
                        return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
                    };
                    const item = document.createElement('div');
                    item.className = 'account-item';
                    item.innerHTML = `
                        <div class="account-info">
                            <span class="account-email">${acc.email}</span>
                            <span class="account-site">${acc.platform}</span>
                            <span class="account-countdown" id="cd-${idx}">${fmt(remain)}</span>
                        </div>
                        <button class="btn btn-outline btn-delete">🗑️</button>
                    `;
                    accountsContainer.appendChild(item);
                    const interval = setInterval(() => {
                        const r = Math.max(0, nextClaim - Date.now());
                        const el = document.getElementById(`cd-${idx}`);
                        if (el) el.textContent = fmt(r);
                    }, 1000);
                    countdownIntervals.push(interval);
                });

                document.querySelectorAll('.btn-delete').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const idx = Array.from(btn.parentElement.parentElement.children).indexOf(btn.parentElement);
                        const acc = visible[idx];
                        if (!confirm(`Supprimer ${acc.email} ?`)) return;
                        btn.disabled = true;
                        try {
                            await triggerWorkflow('logout.yml', { email: acc.email, password: acc.password, platform: acc.platform, proxyIndex: String(acc.proxyIndex||0), userId: currentUserId });
                            showToast('Suppression lancée', 'success');
                            setTimeout(async () => { currentAccounts = await loadAccounts(); renderAccounts(); }, 15000);
                        } catch (err) { showToast('Erreur: ' + err.message, 'error'); }
                        btn.disabled = false;
                    });
                });
            }

            // Initialisation
            (async function start() {
                currentUserId = await getUserId();
                if (!currentUserId) return;
                showToast('✅ Connecté', 'success');
                try {
                    currentAccounts = await loadAccounts();
                    renderAccounts();
                } catch (e) { showToast('Erreur chargement: ' + e.message, 'error'); }
                setInterval(async () => {
                    try { currentAccounts = await loadAccounts(); renderAccounts(); } catch (e) {}
                }, 30000);
            })();

            // Événements
            btnAdd.addEventListener('click', () => modal.classList.add('active'));
            logoutBtn.addEventListener('click', () => { localStorage.removeItem('auth_token'); window.location.href = '/index.html'; });
            refreshBtn.addEventListener('click', async () => {
                try { currentAccounts = await loadAccounts(); renderAccounts(); } catch (e) { showToast('Erreur: ' + e.message, 'error'); }
            });
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value.trim().toLowerCase();
                const password = document.getElementById('password').value;
                const platform = document.getElementById('platform').value;
                const timerStr = document.getElementById('initialTimer').value;
                modal.classList.remove('active');
                try {
                    await triggerWorkflow('test-account.yml', { email, password, platform, proxyIndex: '0', initialTimer: timerStr, action: 'login', userId: currentUserId });
                    showToast('Ajout lancé', 'success');
                    setTimeout(async () => { currentAccounts = await loadAccounts(); renderAccounts(); }, 15000);
                } catch (err) { showToast('Erreur: ' + err.message, 'error'); }
            });
        }

        // Démarrer seulement si Supabase est prêt
        initWhenSupabaseReady();
    </script>
</body>
</html>
