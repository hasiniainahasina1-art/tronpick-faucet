<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – Test</title>
</head>
<body>
    <h1 id="welcomeMessage">⚙️ Chargement...</h1>
    <p id="status"></p>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        window.addEventListener('DOMContentLoaded', function() {
            const welcome = document.getElementById('welcomeMessage');
            const status = document.getElementById('status');

            const token = localStorage.getItem('auth_token');
            if (!token) {
                welcome.textContent = 'Non connecté, redirection...';
                window.location.href = '/index.html';
                return;
            }

            // Charger la configuration
            fetch('/api/config')
                .then(res => res.json())
                .then(config => {
                    status.textContent = 'Config chargée. Création du client Supabase...';
                    const supabase = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
                    return supabase.auth.getUser(token);
                })
                .then(({ data: { user }, error }) => {
                    if (error) throw error;
                    if (!user) throw new Error('Utilisateur non trouvé');
                    const username = user.user_metadata?.username || user.email;
                    welcome.textContent = `Bienvenue, ${username}`;
                    status.textContent = '✅ Authentification réussie. Dashboard minimal chargé.';
                })
                .catch(err => {
                    welcome.textContent = 'Erreur';
                    status.textContent = '❌ ' + err.message;
                });
        });
    </script>
</body>
</html>
