<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test boutons dashboard</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        button { padding: 10px 20px; margin: 10px; font-size: 16px; }
    </style>
</head>
<body>
    <h1>Test des boutons</h1>
    <button id="addBtn">➕ Ajouter un compte</button>
    <button id="logoutBtn">🚪 Déconnexion</button>
    <button id="refreshBtn">🔄 Rafraîchir</button>
    <p id="result"></p>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const result = document.getElementById('result');
            result.textContent = 'Script chargé.';

            document.getElementById('addBtn').addEventListener('click', () => {
                alert('Ajouter cliqué');
                result.textContent = 'Ajouter cliqué';
            });
            document.getElementById('logoutBtn').addEventListener('click', () => {
                alert('Déconnexion cliquée');
                result.textContent = 'Déconnexion cliquée';
            });
            document.getElementById('refreshBtn').addEventListener('click', () => {
                alert('Rafraîchir cliqué');
                result.textContent = 'Rafraîchir cliqué';
            });
        });
    </script>
</body>
</html>
