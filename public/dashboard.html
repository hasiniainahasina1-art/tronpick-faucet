<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – Finoana Auto Claim</title>
    <style>
        :root {
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --danger: #ef4444;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --radius: 8px;
            --shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 0.85rem;
            line-height: 1.4;
            min-height: 100vh;
        }
        .header {
            background: var(--card-bg);
            padding: 12px 24px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }
        .header h1 { font-size: 1.2rem; font-weight: 700; }
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
            text-decoration: none;
            white-space: nowrap;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
        .btn-outline:hover { background: #f1f5f9; }
        .btn-danger { background: var(--danger); color: white; }
        .container { max-width: 800px; margin: 20px auto; padding: 0 16px; }
        .card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 20px; }
        .accounts-list { display: flex; flex-direction: column; gap: 10px; }
        .account-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px; background: #f8fafc; border-radius: 6px; border: 1px solid var(--border);
        }
        .account-info { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; flex: 1; }
        .account-email { font-weight: 600; }
        .account-site { background: #e2e8f0; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; color: var(--text-secondary); }
        .account-countdown { font-weight: 700; color: var(--primary); }
        .account-countdown.expired { color: var(--danger); }
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
            z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--card-bg); border-radius: var(--radius); padding: 24px;
            width: 90%; max-width: 420px; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: 500; font-size: 0.9rem; }
        .form-group input, .form-group select {
            width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.9rem;
        }
        .toast {
            position: fixed; bottom: 24px; right: 24px; background: var(--text); color: white;
            padding: 12px 20px; border-radius: 6px; font-weight: 500; z-index: 2000;
            opacity: 0; transform: translateX(80px); transition: all 0.3s ease;
        }
        .toast.show { opacity: 1; transform: translateX(0); }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
    </style>
</head>
<body>
    <header class="header">
        <h1>⚙️ Finoana Auto Claim</h1>
        <div>
            <button class="btn btn-primary" id="btnAddAccount">➕ Ajouter un compte</button>
            <button class="btn btn-outline" id="logoutBtn" style="margin-left:8px;">🚪 Déconnexion</button>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <h2>📋 Mes comptes</h2>
            <div id="accountsContainer" class="accounts-list"></div>
            <div style="text-align:center; margin-top:16px;">
                <button class="btn btn-outline" id="refreshBtn">🔄 Rafraîchir</button>
            </div>
        </div>
    </div>

    <!-- Modale -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3 id="modalTitle">➕ Nouveau compte</h3>
            <form id="accountForm">
                <input type="hidden" id="editIndex" value="-1">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="exemple@mail.com">
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label>Plateforme</label>
                    <select id="platform">
                        <option value="tronpick">TronPick</option>
                        <option value="litepick">LitePick</option>
                        <option value="dogepick">DogePick</option>
                        <option value="solpick">SolPick</option>
                        <option value="binpick">BinPick</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Timer initial (mm:ss)</label>
                    <input type="text" id="initialTimer" placeholder="60:00" pattern="[0-9]{1,2}:[0-5][0-9]">
                </div>
                <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:16px;">
                    <button type="button" class="btn btn-outline" id="btnCancel">Annuler</button>
                    <button type="submit" class="btn btn-primary" id="btnSubmit">💾 Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Attendre que le DOM soit entièrement chargé
        window.addEventListener('DOMContentLoaded', function() {
            // Récupération des éléments du DOM
            const btnAdd = document.getElementById('btnAddAccount');
            const logoutBtn = document.getElementById('logoutBtn');
            const modal = document.getElementById('modalOverlay');
            const btnCancel = document.getElementById('btnCancel');
            const form = document.getElementById('accountForm');
            const refreshBtn = document.getElementById('refreshBtn');
            const toast = document.getElementById('toast');

            // Vérification immédiate que les boutons existent
            if (!btnAdd || !logoutBtn) {
                alert('Erreur : boutons non trouvés dans la page');
                return;
            }

            // --- Fonctions simples de test ---
            function showToast(message, type = '') {
                toast.textContent = message;
                toast.className = `toast ${type} show`;
                setTimeout(() => { toast.className = 'toast'; }, 5000);
            }

            // --- Événements garantis ---
            btnAdd.addEventListener('click', function() {
                alert('Bouton Ajouter cliqué ! (version test)');
            });

            logoutBtn.addEventListener('click', function() {
                alert('Bouton Déconnexion cliqué ! (version test)');
            });

            // Optionnel : bouton rafraîchir factice
            refreshBtn.addEventListener('click', function() {
                alert('Rafraîchir (test)');
            });

            // Si les alertes s'affichent, c'est que les événements fonctionnent.
            // Tu pourras ensuite remplacer les alert par le code réel.
        });
    </script>
</body>
</html>
