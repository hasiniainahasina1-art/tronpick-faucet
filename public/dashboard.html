<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – Finoana Auto Claim</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        button { padding: 8px 16px; margin: 5px; cursor: pointer; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .toast { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>Tableau de bord</h1>
    <div id="status" class="info">Chargement de la session…</div>
    <button id="addBtn" disabled>➕ Ajouter un compte</button>
    <button id="logoutBtn">🚪 Déconnexion</button>
    <h2>Mes comptes</h2>
    <div id="accountsTable"></div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Attendre que la page ET la bibliothèque Supabase soient chargées
        window.addEventListener('load', function() {
            // Vérification de la bibliothèque
            if (typeof window.supabase === 'undefined') {
                document.getElementById('status').textContent = '❌ Bibliothèque Supabase non chargée.';
                document.getElementById('status').className = 'error';
                return;
            }

            // Configuration
            const SUPABASE_URL = 'https://xwmituhhszailaaxposg.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh3bWl0dWhoc3phaWxhYXhwb3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMjQ4MzQsImV4cCI6MjA5MjgwMDgzNH0.-LWoiKQVvgAhkkG1fF5067V-1ckA2aQ4UaUxfS95ukE';
            const GH_USERNAME = 'hasiniainahasina1-art';
            const GH_REPO = 'tronpick-faucet';
            const BRANCH = 'main';

            let currentUserId = null;
            let accounts = [];

            const statusDiv = document.getElementById('status');
            const addBtn = document.getElementById('addBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const accountsDiv = document.getElementById('accountsTable');

            function showToast(msg, type) {
                const div = document.createElement('div');
                div.className = `toast ${type}`;
                div.textContent = msg;
                document.body.prepend(div);
                setTimeout(() => div.remove(), 6000);
            }

            // Authentification
            async function initAuth() {
                try {
                    const token = localStorage.getItem('auth_token');
                    if (!token) {
                        statusDiv.textContent = '❌ Non connecté. Redirection…';
                        statusDiv.className = 'error';
                        window.location.href = '/index.html';
                        return false;
                    }

                    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    const { data: { user }, error } = await supabase.auth.getUser(token);
                    if (error) throw error;
                    if (!user) throw new Error('Utilisateur non trouvé');

                    currentUserId = user.id;
                    statusDiv.textContent = '✅ Connecté (ID: ' + currentUserId + ')';
                    statusDiv.className = 'success';
                    addBtn.disabled = false;
                    return true;
                } catch (e) {
                    statusDiv.textContent = '❌ Échec de l\'authentification : ' + e.message;
                    statusDiv.className = 'error';
                    addBtn.disabled = true;
                    if (confirm('Voulez-vous retourner à la page de connexion ?')) {
                        localStorage.removeItem('auth_token');
                        window.location.href = '/index.html';
                    }
                    return false;
                }
            }

            // API GitHub via proxy
            async function githubApi(method, path, body = null) {
                const url = `/api/data?path=${encodeURIComponent(path)}&userId=${currentUserId}`;
                const options = { method, headers: { 'Content-Type': 'application/json' } };
                if (body) options.body = JSON.stringify(body);
                const res = await fetch(url, options);
                if (res.status === 204) return {};
                const data = await res.json();
                if (!res.ok) {
                    const error = new Error(data.error || data.message || `HTTP ${res.status}`);
                    error.status = res.status;
                    throw error;
                }
                return data;
            }

            // Charger les comptes (gère le fichier inexistant)
            async function loadAccounts() {
                const apiPath = `/repos/${GH_USERNAME}/${GH_REPO}/contents/accounts.json`;
                try {
                    const data = await githubApi('GET', apiPath);
                    return JSON.parse(atob(data.content));
                } catch (e) {
                    if (e.status === 404) return [];
                    throw e;
                }
            }

            // Déclencher un workflow
            async function dispatchWorkflow(workflowId, inputs) {
                const apiPath = `/repos/${GH_USERNAME}/${GH_REPO}/actions/workflows/${workflowId}/dispatches`;
                const payload = { ref: BRANCH, inputs: inputs };
                await githubApi('POST', apiPath, payload);
            }

            // Affichage des comptes
            async function renderAccounts() {
                try {
                    accounts = await loadAccounts();
                    if (!accounts.length) {
                        accountsDiv.innerHTML = '<p>Aucun compte configuré.</p>';
                        return;
                    }

                    let html = '<table><tr><th>Email</th><th>Plateforme</th><th>Prochain claim</th><th>Actions</th></tr>';
                    accounts.forEach((acc, idx) => {
                        const now = Date.now();
                        const last = acc.lastClaim || 0;
                        const intervalMs = (acc.timer || 60) * 60 * 1000;
                        const nextClaim = last + intervalMs;
                        const remain = Math.max(0, nextClaim - now);
                        const fmt = ms => {
                            const s = Math.floor(ms/1000);
                            return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
                        };
                        html += `<tr>
                            <td>${acc.email}</td>
                            <td>${acc.platform}</td>
                            <td>${fmt(remain)}</td>
                            <td><button data-del="${idx}">🗑️ Supprimer</button></td>
                        </tr>`;
                    });
                    html += '</table>';
                    accountsDiv.innerHTML = html;

                    // Événements de suppression
                    document.querySelectorAll('button[data-del]').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            const idx = parseInt(btn.dataset.del);
                            const acc = accounts[idx];
                            if (!confirm(`Supprimer ${acc.email} ?`)) return;
                            btn.disabled = true;
                            try {
                                await dispatchWorkflow('logout.yml', {
                                    email: acc.email,
                                    password: acc.password || '',
                                    platform: acc.platform,
                                    proxyIndex: String(acc.proxyIndex||0),
                                    userId: currentUserId
                                });
                                showToast('🗑️ Suppression lancée', 'success');
                                setTimeout(renderAccounts, 10000);
                            } catch (err) {
                                showToast('Erreur : ' + err.message, 'error');
                                btn.disabled = false;
                            }
                        });
                    });
                } catch (e) {
                    showToast('Erreur chargement comptes : ' + e.message, 'error');
                }
            }

            // Déconnexion
            logoutBtn.addEventListener('click', () => {
                localStorage.removeItem('auth_token');
                window.location.href = '/index.html';
            });

            // Ajout d'un compte
            addBtn.addEventListener('click', async () => {
                const email = prompt('Email :');
                if (!email) return;
                const password = prompt('Mot de passe :');
                if (!password) return;
                const platform = prompt('Plateforme (tronpick, litepick, dogepick, solpick, binpick) :', 'tronpick');
                if (!platform) return;
                const timerStr = prompt('Timer initial (mm:ss) :', '60:00');
                if (!timerStr) return;

                try {
                    await dispatchWorkflow('test-account.yml', {
                        email: email.toLowerCase().trim(),
                        password: password,
                        platform: platform,
                        proxyIndex: String(accounts.length % 2),
                        initialTimer: timerStr,
                        action: 'login',
                        userId: currentUserId
                    });
                    showToast('✅ Ajout lancé. Patientez…', 'success');
                    setTimeout(renderAccounts, 15000);
                } catch (err) {
                    showToast('❌ Erreur : ' + err.message, 'error');
                }
            });

            // Lancement de l'application
            initAuth().then(success => {
                if (success) {
                    renderAccounts();
                    setInterval(renderAccounts, 30000);
                }
            });
        });
    </script>
</body>
</html>
