<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – Vérification Payload</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        button { padding: 8px 16px; margin: 5px; cursor: pointer; }
        .toast { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        pre { background: #f0f0f0; padding: 10px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>Vérification du payload</h1>
    <div id="status"></div>
    <button id="addBtn">➕ Ajouter un compte</button>
    <div id="result"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://xwmituhhszailaaxposg.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh3bWl0dWhoc3phaWxhYXhwb3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMjQ4MzQsImV4cCI6MjA5MjgwMDgzNH0.-LWoiKQVvgAhkkG1fF5067V-1ckA2aQ4UaUxfS95ukE';
        const GH_USERNAME = 'hasiniainahasina1-art';
        const GH_REPO = 'tronpick-faucet';
        const BRANCH = 'main';

        let currentUserId = null;

        function showToast(msg, type) {
            const div = document.createElement('div');
            div.className = `toast ${type}`;
            div.textContent = msg;
            document.body.prepend(div);
            setTimeout(() => div.remove(), 5000);
        }

        (async function init() {
            const token = localStorage.getItem('auth_token');
            if (!token) {
                document.getElementById('status').textContent = 'Non connecté.';
                return;
            }
            const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            try {
                const { data: { user }, error } = await supabase.auth.getUser(token);
                if (error) throw error;
                currentUserId = user.id;
                document.getElementById('status').textContent = '✅ Connecté. UserId : ' + currentUserId;
            } catch (e) {
                document.getElementById('status').textContent = 'Erreur auth : ' + e.message;
            }
        })();

        document.getElementById('addBtn').addEventListener('click', () => {
            const email = prompt('Email :', 'test@test.com');
            if (!email) return;
            const password = prompt('Mot de passe :', 'test');
            if (!password) return;
            const platform = prompt('Plateforme :', 'tronpick');
            if (!platform) return;
            const timerStr = prompt('Timer (mm:ss) :', '60:00');
            if (!timerStr) return;

            if (!currentUserId) {
                showToast('UserId non défini', 'error');
                return;
            }

            const payload = {
                ref: BRANCH,
                inputs: {
                    email: email,
                    password: password,
                    platform: platform,
                    proxyIndex: '0',
                    initialTimer: timerStr,
                    action: 'login',
                    userId: currentUserId
                }
            };

            // Afficher le payload
            document.getElementById('result').innerHTML = '<pre>' + JSON.stringify(payload, null, 2) + '</pre>';
            alert('Payload qui sera envoyé :\n\n' + JSON.stringify(payload, null, 2));
        });
    </script>
</body>
</html>
