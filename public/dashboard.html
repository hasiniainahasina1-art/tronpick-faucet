<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – Finoana Auto Claim</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        button { padding: 8px 16px; margin: 5px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .toast { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Tableau de bord</h1>
    <div id="status"></div>
    <button id="addBtn">➕ Ajouter un compte</button>
    <button id="logoutBtn">🚪 Déconnexion</button>

    <h2>Mes comptes</h2>
    <div id="accountsTable"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // --- Configuration ---
        const SUPABASE_URL = 'https://xwmituhhszailaaxposg.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh3bWl0dWhoc3phaWxhYXhwb3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMjQ4MzQsImV4cCI6MjA5MjgwMDgzNH0.-LWoiKQVvgAhkkG1fF5067V-1ckA2aQ4UaUxfS95ukE';
        const GH_USERNAME = 'hasiniainahasina1-art';
        const GH_REPO = 'tronpick-faucet';
        const BRANCH = 'main';

        let currentUserId = null;
        let accounts = [];

        // --- Utilitaires ---
        function showToast(msg, type) {
            const div = document.createElement('div');
            div.className = `toast ${type}`;
            div.textContent = msg;
            document.body.prepend(div);
            setTimeout(() => div.remove(), 5000);
        }

        async function githubApi(method, path, body = null) {
            const url = `/api/data?path=${encodeURIComponent(path)}&userId=${currentUserId}`;
            const options = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) options.body = JSON.stringify(body);
            const res = await fetch(url, options);
            if (res.status === 204) return {};
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || data.message || `HTTP ${res.status}`);
            return data;
        }

        async function loadAccounts() {
            const apiPath = `/repos/${GH_USERNAME}/${GH_REPO}/contents/accounts.json`;
            try {
                const data = await githubApi('GET', apiPath);
                return JSON.parse(atob(data.content));
            } catch (e) {
                if (e.message.includes('404')) return [];
                throw e;
            }
        }

        async function saveAccounts(accs) {
            const apiPath = `/repos/${GH_USERNAME}/${GH_REPO}/contents/accounts.json`;
            let sha = null;
            try { const d = await githubApi('GET', apiPath); sha = d.sha; } catch (e) {}
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(accs, null, 2))));
            const body = { message: 'Mise à jour comptes', content, branch: BRANCH };
            if (sha) body.sha = sha;
            await githubApi('PUT', apiPath, body);
        }

        async function dispatchWorkflow(workflowId, inputs) {
            const apiPath = `/repos/${GH_USERNAME}/${GH_REPO}/actions/workflows/${workflowId}/dispatches`;
            const payload = { ref: BRANCH, inputs: inputs };
            await githubApi('POST', apiPath, payload);
        }

        function renderAccounts() {
            const container = document.getElementById('accountsTable');
            if (!accounts.length) {
                container.innerHTML = '<p>Aucun compte configuré.</p>';
                return;
            }
            let html = '<table><tr><th>Email</th><th>Plateforme</th><th>Prochain claim</th><th>Actions</th></tr>';
            accounts.forEach((acc, idx) => {
                const now = Date.now();
                const last = acc.lastClaim || 0;
                const intervalMs = (acc.timer || 60) * 60 * 1000;
                const nextClaim = last + intervalMs;
                const remain = Math.max(0, nextClaim - now);
                const fmt = ms => {
                    const s = Math.floor(ms/1000);
                    return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
                };
                html += `<tr>
                    <td>${acc.email}</td>
                    <td>${acc.platform}</td>
                    <td>${fmt(remain)}</td>
                    <td><button data-del="${idx}">🗑️ Supprimer</button></td>
                </tr>`;
            });
            html += '</table>';
            container.innerHTML = html;

            // Attacher les suppressions
            document.querySelectorAll('button[data-del]').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const idx = parseInt(btn.dataset.del);
                    const acc = accounts[idx];
                    if (!confirm(`Supprimer ${acc.email} ?`)) return;
                    btn.disabled = true;
                    try {
                        await dispatchWorkflow('logout.yml', {
                            email: acc.email,
                            password: acc.password || '',
                            platform: acc.platform,
                            proxyIndex: String(acc.proxyIndex||0),
                            userId: currentUserId
                        });
                        showToast('🗑️ Suppression lancée', 'success');
                        // Attendre un peu puis rafraîchir
                        setTimeout(async () => {
                            accounts = await loadAccounts();
                            renderAccounts();
                        }, 10000);
                    } catch (err) {
                        showToast('Erreur : ' + err.message, 'error');
                    } finally {
                        btn.disabled = false;
                    }
                });
            });
        }

        // --- Initialisation ---
        (async function init() {
            // Récupérer le token Supabase
            const token = localStorage.getItem('auth_token');
            if (!token) {
                window.location.href = '/index.html';
                return;
            }
            const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            try {
                const { data: { user }, error } = await supabase.auth.getUser(token);
                if (error) throw error;
                currentUserId = user.id;
                document.getElementById('status').textContent = '✅ Connecté (ID: ' + currentUserId + ')';
            } catch (e) {
                document.getElementById('status').textContent = '❌ Session invalide. Redirection...';
                localStorage.removeItem('auth_token');
                setTimeout(() => { window.location.href = '/index.html'; }, 2000);
                return;
            }

            // Charger les comptes
            try {
                accounts = await loadAccounts();
                renderAccounts();
            } catch (e) {
                showToast('Erreur chargement comptes : ' + e.message, 'error');
            }

            // Rafraîchissement périodique
            setInterval(async () => {
                try {
                    accounts = await loadAccounts();
                    renderAccounts();
                } catch (e) {}
            }, 30000);
        })();

        // --- Événements ---
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('auth_token');
            window.location.href = '/index.html';
        });

        document.getElementById('addBtn').addEventListener('click', async () => {
            const email = prompt('Email :');
            if (!email) return;
            const password = prompt('Mot de passe :');
            if (!password) return;
            const platform = prompt('Plateforme (tronpick, litepick, dogepick, solpick, binpick) :', 'tronpick');
            if (!platform) return;
            const timerStr = prompt('Timer initial (mm:ss) :', '60:00');
            if (!timerStr) return;

            showToast('⏳ Ajout en cours...', 'success');
            try {
                await dispatchWorkflow('test-account.yml', {
                    email: email.toLowerCase().trim(),
                    password: password,
                    platform: platform,
                    proxyIndex: String(accounts.length % 2),
                    initialTimer: timerStr,
                    action: 'login',
                    userId: currentUserId
                });
                showToast('✅ Ajout lancé. Veuillez patienter...', 'success');
                // Attendre un peu puis rafraîchir
                setTimeout(async () => {
                    accounts = await loadAccounts();
                    renderAccounts();
                }, 15000);
            } catch (err) {
                showToast('❌ Erreur : ' + err.message, 'error');
            }
        });
    </script>
</body>
</html>
