<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – Finoana Auto Claim</title>
    <style>
        :root {
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --danger: #ef4444;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --radius: 8px;
            --shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 0.85rem;
            line-height: 1.4;
            min-height: 100vh;
        }
        .header {
            background: var(--card-bg);
            padding: 12px 24px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }
        .header h1 { font-size: 1.2rem; font-weight: 700; }
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
            text-decoration: none;
            white-space: nowrap;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .container { max-width: 800px; margin: 20px auto; padding: 0 16px; }
        .card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 20px; }
        .accounts-list { display: flex; flex-direction: column; gap: 10px; }
        .account-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px; background: #f8fafc; border-radius: 6px; border: 1px solid var(--border);
        }
        .account-info { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; flex: 1; }
        .account-email { font-weight: 600; }
        .account-site { background: #e2e8f0; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; color: var(--text-secondary); }
        .account-countdown { font-weight: 700; color: var(--primary); }
        .account-countdown.expired { color: var(--danger); }
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
            z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--card-bg); border-radius: var(--radius); padding: 24px;
            width: 90%; max-width: 420px; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: 500; font-size: 0.9rem; }
        .form-group input, .form-group select {
            width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.9rem;
        }
        .toast {
            position: fixed; bottom: 24px; right: 24px; background: var(--text); color: white;
            padding: 12px 20px; border-radius: 6px; font-weight: 500; z-index: 2000;
            opacity: 0; transform: translateX(80px); transition: all 0.3s ease;
        }
        .toast.show { opacity: 1; transform: translateX(0); }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
    </style>
</head>
<body>
    <header class="header">
        <h1>⚙️ Finoana Auto Claim</h1>
        <div>
            <button class="btn btn-primary" id="btnAddAccount">➕ Ajouter un compte</button>
            <button class="btn btn-primary" id="logoutBtn" style="margin-left:8px;">🚪 Déconnexion</button>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <h2>📋 Mes comptes</h2>
            <div id="accountsContainer" class="accounts-list">
                <p style="text-align:center; padding:20px;">Chargement...</p>
            </div>
            <div style="text-align:center; margin-top:16px;">
                <button class="btn btn-primary" id="refreshBtn">🔄 Rafraîchir</button>
            </div>
        </div>
    </div>

    <!-- Modale -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3 id="modalTitle">➕ Nouveau compte</h3>
            <form id="accountForm">
                <input type="hidden" id="editIndex" value="-1">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="exemple@mail.com">
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label>Plateforme</label>
                    <select id="platform">
                        <option value="tronpick">TronPick</option>
                        <option value="litepick">LitePick</option>
                        <option value="dogepick">DogePick</option>
                        <option value="solpick">SolPick</option>
                        <option value="binpick">BinPick</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Timer initial (mm:ss)</label>
                    <input type="text" id="initialTimer" placeholder="60:00" pattern="[0-9]{1,2}:[0-5][0-9]">
                </div>
                <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:16px;">
                    <button type="button" class="btn btn-primary" id="btnCancel">Annuler</button>
                    <button type="submit" class="btn btn-primary" id="btnSubmit">💾 Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        window.addEventListener('DOMContentLoaded', function() {
            // ---------- 1. Vérification rapide des boutons ----------
            const btnAdd = document.getElementById('btnAddAccount');
            const logoutBtn = document.getElementById('logoutBtn');
            const refreshBtn = document.getElementById('refreshBtn');
            const modal = document.getElementById('modalOverlay');
            const btnCancel = document.getElementById('btnCancel');
            const form = document.getElementById('accountForm');

            if (!btnAdd || !logoutBtn) {
                alert('Erreur critique : boutons introuvables.');
                return;
            }

            // Test : les boutons doivent montrer une alerte (on garde ce test tant que le reste n'est pas validé)
            btnAdd.addEventListener('click', function() { alert('Bouton Ajouter OK'); });
            logoutBtn.addEventListener('click', function() { alert('Bouton Déconnexion OK'); });
            refreshBtn.addEventListener('click', function() { alert('Bouton Rafraîchir OK'); });

            // ---------- 2. Authentification Supabase ----------
            const token = localStorage.getItem('auth_token');
            if (!token) {
                alert('Token absent, redirection vers connexion.');
                window.location.href = '/index.html';
                return;
            }

            const supabaseUrl = 'https://xwmituhhszailaaxposg.supabase.co';
            const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh3bWl0dWhoc3phaWxhYXhwb3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMjQ4MzQsImV4cCI6MjA5MjgwMDgzNH0.-LWoiKQVvgAhkkG1fF5067V-1ckA2aQ4UaUxfS95ukE';
            const supabase = supabase.createClient(supabaseUrl, supabaseAnonKey);

            async function getUserId() {
                try {
                    const { data: { user }, error } = await supabase.auth.getUser(token);
                    if (error) throw error;
                    if (!user) throw new Error('Utilisateur non trouvé');
                    return user.id;
                } catch (e) {
                    alert('Erreur authentification : ' + e.message + '. Redirection...');
                    localStorage.removeItem('auth_token');
                    window.location.href = '/index.html';
                    return null;
                }
            }

            // ---------- 3. Appels API ----------
            let currentUserId = null;
            let currentAccounts = [];

            const GH_USERNAME = 'hasiniainahasina1-art';
            const GH_REPO = 'tronpick-faucet';
            const BRANCH = 'main';
            const BASE_FILE_PATH = 'accounts.json';

            async function githubApi(method, path, body = null) {
                const url = `/api/data?path=${encodeURIComponent(path)}&userId=${currentUserId}`;
                const options = { method, headers: { 'Content-Type': 'application/json' } };
                if (body) options.body = JSON.stringify(body);
                const res = await fetch(url, options);
                if (res.status === 204) return {};
                const data = await res.json();
                if (!res.ok) throw new Error(data.message || `HTTP ${res.status}`);
                return data;
            }

            async function loadAccounts() {
                const apiPath = `/repos/${GH_USERNAME}/${GH_REPO}/contents/${BASE_FILE_PATH}`;
                const data = await githubApi('GET', apiPath);
                return JSON.parse(atob(data.content));
            }

            // ---------- 4. Initialisation progressive ----------
            (async function init() {
                currentUserId = await getUserId();
                if (!currentUserId) return; // l'alerte a déjà été affichée

                alert('Authentification réussie. UserId : ' + currentUserId);

                try {
                    currentAccounts = await loadAccounts();
                    alert('Comptes chargés : ' + currentAccounts.length);
                    // Afficher les comptes dans le container (version simple)
                    const container = document.getElementById('accountsContainer');
                    container.innerHTML = currentAccounts.length === 0
                        ? '<p style="text-align:center; padding:20px;">Aucun compte configuré.</p>'
                        : currentAccounts.map(acc => `<div class="account-item"><span>${acc.email} – ${acc.platform}</span></div>`).join('');
                } catch (e) {
                    alert('Erreur lors du chargement des comptes : ' + e.message);
                }
            })();
        });
    </script>
</body>
</html>
