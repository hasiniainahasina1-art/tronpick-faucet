<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finoana Claim – Connexion</title>
    <style>
        :root {
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --danger: #ef4444;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --radius: 16px;
            --shadow: 0 10px 25px rgba(0,0,0,0.06);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f0f4f8 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 40px 32px;
            width: 100%;
            max-width: 420px;
            transition: all 0.3s ease;
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo-icon { font-size: 2.5rem; margin-bottom: 8px; color: var(--primary); }
        .logo h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.3px; }
        .logo p { font-size: 0.85rem; color: var(--text-light); margin-top: 4px; }

        .form-group { margin-bottom: 20px; position: relative; }

        /* Labels fixes par défaut (mode connexion) */
        .form-group label.fixed-label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text);
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 0.95rem;
            background: #fafbfc;
            transition: border 0.2s, box-shadow 0.2s;
            outline: none;
        }
        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
            background: #fff;
        }

        /* Floating labels : uniquement si le conteneur a la classe 'floating' */
        .floating .form-group { position: relative; }
        .floating .form-group label {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: #fafbfc;
            padding: 0 6px;
            font-size: 0.85rem;
            color: var(--text-light);
            pointer-events: none;
            transition: all 0.15s ease;
        }
        .floating .form-group input:focus + label,
        .floating .form-group input:not(:placeholder-shown) + label {
            top: -8px;
            transform: translateY(0);
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--primary);
            background: #ffffff;
            padding: 0 8px;
        }

        .password-wrapper { position: relative; }
        .toggle-password {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer; font-size: 1.2rem;
            color: var(--text-light);
        }

        .error-message, .success-message {
            font-size: 0.75rem; margin-top: 6px; display: none;
        }
        .error-message { color: var(--danger); }
        .success-message { color: var(--success); }
        .visible { display: block; }

        .btn-primary {
            width: 100%; padding: 14px; border-radius: 10px; border: none;
            font-weight: 600; cursor: pointer; font-size: 1rem;
            background: var(--primary); color: white;
            transition: background 0.2s, transform 0.2s;
            letter-spacing: 0.3px; margin-top: 8px;
        }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }

        .toggle-link { text-align: center; margin-top: 18px; font-size: 0.85rem; }
        .toggle-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .toggle-link a:hover { text-decoration: underline; }

        .forgot-password { text-align: right; margin-bottom: 4px; }
        .forgot-password a { font-size: 0.8rem; color: var(--primary); text-decoration: none; }
        .forgot-password a:hover { text-decoration: underline; }

        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
            border-radius: 50%; animation: spin 0.6s linear infinite;
            margin-right: 8px; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .version { text-align: center; margin-top: 24px; font-size: 0.7rem; color: var(--text-light); }
        .hidden-field { display: none; }
    </style>
</head>
<body>
    <div class="login-container" id="mainContainer">
        <div class="logo">
            <div class="logo-icon">⚙️</div>
            <h1>Finoana Claim</h1>
            <p id="formDescription">Connectez-vous à votre compte</p>
        </div>

        <form id="authForm" novalidate>
            <!-- Champ username (visible seulement en inscription) -->
            <div class="form-group hidden-field" id="usernameGroup">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" placeholder=" " autocomplete="username">
            </div>

            <div class="form-group">
                <label for="email">Adresse email</label>
                <input type="email" id="email" placeholder="vous@exemple.com" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="toggle-password" id="togglePassword">👁️</button>
                </div>
                <div class="forgot-password">
                    <a href="#" id="forgotPasswordLink">Mot de passe oublié ?</a>
                </div>
            </div>

            <div class="form-group hidden-field" id="confirmPasswordGroup">
                <label for="confirmPassword">Confirmer le mot de passe</label>
                <input type="password" id="confirmPassword" placeholder=" " required autocomplete="new-password">
            </div>

            <div class="success-message" id="successMessage"></div>
            <div class="error-message" id="apiError"></div>

            <button type="submit" class="btn-primary" id="authBtn">
                <span id="authBtnText">Se connecter</span>
            </button>

            <div class="toggle-link">
                <span id="toggleText">Pas encore de compte ?</span>
                <a href="#" id="toggleAuth">Créer un compte</a>
            </div>
        </form>

        <div class="version">v2.0 · Interface sécurisée</div>
    </div>

    <script>
        (function() {
            let mode = 'login';

            const container = document.getElementById('mainContainer');
            const usernameGroup = document.getElementById('usernameGroup');
            const usernameInput = document.getElementById('username');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const confirmPasswordGroup = document.getElementById('confirmPasswordGroup');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const toggleBtn = document.getElementById('togglePassword');
            const authBtn = document.getElementById('authBtn');
            const authBtnText = document.getElementById('authBtnText');
            const toggleAuthLink = document.getElementById('toggleAuth');
            const toggleText = document.getElementById('toggleText');
            const formDescription = document.getElementById('formDescription');
            const apiError = document.getElementById('apiError');
            const successMessage = document.getElementById('successMessage');
            const forgotPasswordLink = document.getElementById('forgotPasswordLink');

            // Afficher/cacher le mot de passe
            toggleBtn.addEventListener('click', () => {
                const isPass = passwordInput.type === 'password';
                passwordInput.type = isPass ? 'text' : 'password';
                toggleBtn.textContent = isPass ? '🙈' : '👁️';
            });

            function setMode(newMode) {
                mode = newMode;
                successMessage.classList.remove('visible');
                apiError.classList.remove('visible');

                if (mode === 'login') {
                    formDescription.textContent = 'Connectez-vous à votre compte';
                    authBtnText.textContent = 'Se connecter';
                    toggleText.textContent = 'Pas encore de compte ?';
                    toggleAuthLink.textContent = 'Créer un compte';
                    usernameGroup.classList.add('hidden-field');
                    confirmPasswordGroup.classList.add('hidden-field');
                    container.classList.remove('floating');  // désactive les floating labels
                } else {
                    formDescription.textContent = 'Créez votre compte';
                    authBtnText.textContent = 'Créer un compte';
                    toggleText.textContent = 'Déjà un compte ?';
                    toggleAuthLink.textContent = 'Se connecter';
                    usernameGroup.classList.remove('hidden-field');
                    confirmPasswordGroup.classList.remove('hidden-field');
                    container.classList.add('floating');     // active les floating labels
                }
            }

            toggleAuthLink.addEventListener('click', (e) => {
                e.preventDefault();
                setMode(mode === 'login' ? 'signup' : 'login');
            });

            function isValidEmail(email) {
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                apiError.classList.remove('visible');
                successMessage.classList.remove('visible');

                const email = emailInput.value.trim();
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;
                const username = usernameInput.value.trim();

                if (!isValidEmail(email)) {
                    apiError.textContent = 'Adresse email invalide.';
                    apiError.classList.add('visible');
                    return;
                }
                if (password.length < 6) {
                    apiError.textContent = 'Le mot de passe doit contenir au moins 6 caractères.';
                    apiError.classList.add('visible');
                    return;
                }

                if (mode === 'signup') {
                    if (!username) {
                        apiError.textContent = 'Le nom d\'utilisateur est requis.';
                        apiError.classList.add('visible');
                        return;
                    }
                    if (password !== confirmPassword) {
                        apiError.textContent = 'Les mots de passe ne correspondent pas.';
                        apiError.classList.add('visible');
                        return;
                    }
                }

                authBtn.disabled = true;
                authBtnText.innerHTML = '<span class="spinner"></span> Patientez…';

                try {
                    const response = await fetch('/api/auth', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            email,
                            password,
                            confirmPassword: mode === 'signup' ? confirmPassword : undefined,
                            username: mode === 'signup' ? username : undefined,
                            mode
                        })
                    });

                    const data = await response.json();

                    authBtn.disabled = false;
                    authBtnText.textContent = mode === 'login' ? 'Se connecter' : 'Créer un compte';

                    if (!response.ok) {
                        apiError.textContent = data.error || 'Erreur inconnue';
                        apiError.classList.add('visible');
                        return;
                    }

                    // Succès inscription
                    if (mode === 'signup') {
                        successMessage.textContent = data.message || 'Compte créé avec succès. Vous pouvez maintenant vous connecter.';
                        successMessage.classList.add('visible');
                        setMode('login');   // repasse en mode connexion
                        // vide les champs
                        usernameInput.value = '';
                        emailInput.value = '';
                        passwordInput.value = '';
                        confirmPasswordInput.value = '';
                        return;
                    }

                    // Succès connexion
                    localStorage.setItem('auth_token', data.token);
                    window.location.href = '/dashboard.html';
                } catch (err) {
                    apiError.textContent = 'Erreur réseau.';
                    apiError.classList.add('visible');
                    authBtn.disabled = false;
                    authBtnText.textContent = mode === 'login' ? 'Se connecter' : 'Créer un compte';
                }
            });

            forgotPasswordLink.addEventListener('click', (e) => {
                e.preventDefault();
                apiError.textContent = 'Fonctionnalité à venir.';
                apiError.classList.add('visible');
            });

            // Redirection si déjà connecté
            const existingToken = localStorage.getItem('auth_token');
            if (existingToken) {
                window.location.href = '/dashboard.html';
            }
        })();
    </script>
</body>
</html>
